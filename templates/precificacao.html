{% extends "base.html" %}

{% block title %}Precificação{% endblock %}

{% block content %}

<div class="precificacao-container">

    <h1>Calcular Preço de Venda</h1>

    <form method="POST" class="form-central">

        <input type="number" step="0.01" name="valor" placeholder="Custo total do produto" required>

        <input type="number" step="0.01" name="lucro" placeholder="Lucro desejado (R$)" required>

        <select name="plataforma" required>
            <option value="1">Mercado Livre</option>
            <option value="2">Shopee</option>
            <option value="3">Elo7</option>
            <option value="4">TikTok Shop</option>
        </select>

        <button type="submit">Calcular</button>

    </form>

    {% if resultado %}
    <div class="resultado-box">
        <h2>Resultado</h2>
        <p>Lucro: R$ {{ resultado.lucro }}</p>
        <p>Taxa: R$ {{ resultado.taxa }}</p>
        <p>Preço Final: R$ {{ resultado.pvenda }}</p>
    </div>
    {% endif %}

</div>

{% endblock %}
